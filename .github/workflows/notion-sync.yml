name: Sync to Notion

on:
  push:
    branches:
      - main
    paths:
      - "writeups/**/*.md"
  workflow_dispatch:
    inputs:
      files:
        description: "Sync할 writeup 경로들. 공백 또는 줄바꿈으로 구분"
        required: false
        type: string
      week_number:
        description: "제출 현황 업데이트에 사용할 주차"
        required: false
        type: string
      pr_number:
        description: "week_number가 없을 때 /week 댓글을 읽어올 merged PR 번호"
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Resolve target writeup files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.files }}" ]; then
            FILES="${{ inputs.files }}"
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'writeups/**/*.md' || true)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Resolve week number
        id: week
        if: steps.changed.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.week_number }}" ]; then
            echo "week=${{ inputs.week_number }}" >> $GITHUB_OUTPUT
            echo "[INFO] Manual dispatch → week: ${{ inputs.week_number }}"
            exit 0
          fi
          PR_NUM="${{ inputs.pr_number }}"
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh pr list --state merged --limit 1 --json number --jq '.[0].number' || true)
          fi
          if [ -z "$PR_NUM" ]; then
            echo "week=" >> $GITHUB_OUTPUT
            exit 0
          fi
          WEEK=$(gh pr view "$PR_NUM" --json comments --jq '.comments[].body' | grep -oP '/week\s+\K\d+' | tail -1 || true)
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "[INFO] PR #$PR_NUM → week: $WEEK"

      - name: Sync to Notion
        if: steps.changed.outputs.files != ''
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_TRACKING_DB_ID: ${{ secrets.NOTION_TRACKING_DB_ID }}
          NOTION_MEMBERS_DB_ID: ${{ secrets.NOTION_MEMBERS_DB_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          WEEK_NUMBER: ${{ steps.week.outputs.week }}
        run: |
          echo "${{ steps.changed.outputs.files }}" | xargs python scripts/sync_notion.py
