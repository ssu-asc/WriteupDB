name: Sync to Notion

on:
  push:
    branches:
      - main
    paths:
      - "writeups/**/*.md"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Get changed writeup files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'writeups/**/*.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get week number from PR comment
        id: week
        if: steps.changed.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(gh pr list --state merged --limit 1 --json number --jq '.[0].number' || true)
          if [ -z "$PR_NUM" ]; then
            echo "week=" >> $GITHUB_OUTPUT
            exit 0
          fi
          WEEK=$(gh pr view "$PR_NUM" --json comments --jq '.comments[].body' | grep -oP '/week\s+\K\d+' | tail -1 || true)
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "[INFO] PR #$PR_NUM → week: $WEEK"

      - name: Sync to Notion
        if: steps.changed.outputs.files != ''
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_TRACKING_DB_ID: ${{ secrets.NOTION_TRACKING_DB_ID }}
          NOTION_MEMBERS_DB_ID: ${{ secrets.NOTION_MEMBERS_DB_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          WEEK_NUMBER: ${{ steps.week.outputs.week }}
        run: |
          echo "${{ steps.changed.outputs.files }}" | xargs python scripts/sync_notion.py
